services:
  node1:
    build: { context: ., dockerfile: server/Dockerfile }
    container_name: av5-node1
    command: ["--id", "1"]
    restart: unless-stopped
    networks:
      raft: { aliases: [node1-raft] }
      client: { aliases: [node1] }
    volumes: ["./data:/app/data"]
  node2:
    build: { context: ., dockerfile: server/Dockerfile }
    container_name: av5-node2
    command: ["--id", "2"]
    restart: unless-stopped
    networks:
      raft: { aliases: [node2-raft] }
      client: { aliases: [node2] }
    volumes: ["./data:/app/data"]
  node3:
    build: { context: ., dockerfile: server/Dockerfile }
    container_name: av5-node3
    command: ["--id", "3"]
    restart: unless-stopped
    networks:
      raft: { aliases: [node3-raft] }
      client: { aliases: [node3] }
    volumes: ["./data:/app/data"]
  node4:
    build: { context: ., dockerfile: server/Dockerfile }
    container_name: av5-node4
    command: ["--id", "4"]
    restart: unless-stopped
    networks:
      raft: { aliases: [node4-raft] }
      client: { aliases: [node4] }
    volumes: ["./data:/app/data"]
  client:
    build: { context: ., dockerfile: client/Dockerfile }
    container_name: av5-client
    profiles: ["client"]
    networks: [client]
    # sem depends_on: evita que 'docker compose run client' reinicie nós parados (cenário 4)

networks:
  # Portas 6001–6004 e 6101–6104 NÃO são publicadas no host — só na rede Docker.
  raft:
    driver: bridge
  client:
    driver: bridge
