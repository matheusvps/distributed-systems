server:
  port: 8084

spring:
  application:
    name: notificacao-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/notificacao;AUTO_SERVER=TRUE}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

promocoes:
  # Chaves privadas locais do servico e chaves publicas compartilhadas.
  private-keys-dir: ${PRIVATE_KEYS_DIR:../../keys/private}
  public-keys-dir: ${PUBLIC_KEYS_DIR:../../keys/public}
  email:
    provider: ${EMAIL_PROVIDER:resend}
    api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:-MS Notificacao <onboarding@resend.dev>}

logging:
  level:
    com.promocoes: INFO
